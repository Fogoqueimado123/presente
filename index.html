<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caixa Surpresa</title>

<!-- FAVICON 🎁 -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/869/869636.png">

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    margin: 0;
}

/* Caixa menor e responsiva */
.caixa {
    width: 30vw;
    height: 30vw;
    max-width: 260px;
    max-height: 260px;
    min-width: 180px;
    min-height: 180px;
    background: red;
    position: relative;
    cursor: pointer;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Tampa */
.tampa {
    width: 110%;
    height: 25%;
    background: darkred;
    position: absolute;
    top: -15%;
    border-radius: 20px;
    transition: 0.5s;
}

/* Fitas */
.fita-vertical {
    position: absolute;
    width: 12%;
    height: 100%;
    background: gold;
}

.fita-horizontal {
    position: absolute;
    height: 12%;
    width: 100%;
    background: gold;
}

/* Laço */
.laco {
    position: absolute;
    top: -25%;
    width: 25%;
    height: 25%;
}

.laco::before,
.laco::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 50%;
    background: gold;
    border-radius: 50px;
}

.laco::before {
    transform: rotate(45deg);
}

.laco::after {
    transform: rotate(-45deg);
}

/* Nota */
.nota {
    width: 120%;
    max-width: 280px;
    position: absolute;
    top: 0;
    opacity: 0;
    transform: translateY(80px);
    transition: 0.5s;
}

/* Animação */
.aberta .tampa {
    transform: translateY(-100%) rotate(-10deg);
}

.aberta .nota {
    opacity: 1;
    transform: translateY(-180%);
}
</style>
</head>

<body>

<div class="caixa" onclick="abrirCaixa(this)">
    <div class="tampa"></div>

    <div class="fita-vertical"></div>
    <div class="fita-horizontal"></div>
    <div class="laco"></div>

    <img class="nota" src="https://www.bcb.gov.br/novasnotas/assets/img/section/50/50_front.jpg">
</div>

<script>
function abrirCaixa(elemento) {
    elemento.classList.toggle("aberta");
}
</script>

</body>
</html>
